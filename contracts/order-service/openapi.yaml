openapi: "3.0.3"
info:
  title: Order Service API
  version: "1.0.0"

paths:
  /api/orders:
    post:
      operationId: placeOrder
      summary: Place a new order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
            example:
              userId: "user-1"
              productId: "prod-1"
              quantity: 2
              totalPrice: 49.99
      responses:
        "201":
          description: Order placed successfully
          headers:
            Location:
              schema:
                type: string
              example: /api/orders/ord-abc-123
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
              example:
                id: "ord-abc-123"
                userId: "user-1"
                productId: "prod-1"
                quantity: 2
                totalPrice: 49.99
                status: "PENDING"
                createdAt: "2026-01-01T12:00:00Z"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Validation failed"
                code: "VALIDATION_ERROR"
                fields:
                  - field: "quantity"
                    message: "must be greater than 0"
        "401":
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Unauthorized"
                code: "UNAUTHORIZED"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "User not found"
                code: "USER_NOT_FOUND"
        "409":
          description: Insufficient stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Insufficient stock"
                code: "INSUFFICIENT_STOCK"
        "503":
          description: Upstream dependency unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/orders/{orderId}:
    get:
      operationId: getOrder
      summary: Get order by ID
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: cancelOrder
      summary: Cancel an order
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Order not found
        "409":
          description: Order cannot be cancelled (already shipped)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Order already shipped"
                code: "ORDER_ALREADY_SHIPPED"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PlaceOrderRequest:
      type: object
      required: [userId, productId, quantity, totalPrice]
      properties:
        userId:
          type: string
          minLength: 1
        productId:
          type: string
          minLength: 1
        quantity:
          type: integer
          minimum: 1
        totalPrice:
          type: number
          exclusiveMinimum: 0

    OrderResponse:
      type: object
      required: [id, userId, productId, quantity, totalPrice, status, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        productId:
          type: string
        quantity:
          type: integer
        totalPrice:
          type: number
        status:
          type: string
          enum: [PENDING, CONFIRMED, SHIPPED, CANCELLED]
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
        code:
          type: string
        fields:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string